name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # essentia-tensorflow no se instala en CI: los imports son lazy en todo
      # el proyecto y la suite corre sin el (verificado empiricamente).
      # --no-deps evita que pip intente resolverlo desde pyproject.
      - name: Install package (sin essentia)
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install pytest mutagen
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # click/rich/numpy hacen falta porque mypy (ignore_missing_imports=false)
      # typechequea los cuerpos de cli/ y core/ que los usan.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install mutagen click rich numpy ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy core/ cli/
